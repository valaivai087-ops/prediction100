<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Life OS 001 | 100 Prediction Models</title>
  <style>
    :root {
      --bg: #0e1116;
      --panel: #151a21;
      --panel-2: #1d232c;
      --line: rgba(255,255,255,.12);
      --text: #f5f7f2;
      --muted: #a9b1b7;
      --teal: #39d3c7;
      --amber: #f3b652;
      --green: #91d66d;
      --red: #ef776f;
      --shadow: 0 18px 48px rgba(0,0,0,.28);
      --radius: 8px;
      font-family: Inter, "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
    }

    button, input, select {
      font: inherit;
    }

    button {
      color: inherit;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.06);
      cursor: pointer;
    }

    button:hover, button:focus-visible {
      border-color: rgba(57,211,199,.65);
      outline: none;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .hero {
      position: relative;
      min-height: min(72vh, 720px);
      display: flex;
      align-items: end;
      overflow: hidden;
      border-bottom: 1px solid var(--line);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(14,17,22,.96) 0%, rgba(14,17,22,.76) 42%, rgba(14,17,22,.20) 100%),
        linear-gradient(0deg, rgba(14,17,22,1) 0%, rgba(14,17,22,.08) 46%),
        url("life-os-hero.png") center / cover no-repeat;
      transform: scale(1.01);
    }

    .hero-inner {
      position: relative;
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 72px 0 44px;
    }

    .eyebrow {
      display: flex;
      gap: 10px;
      align-items: center;
      color: var(--teal);
      font-weight: 800;
      letter-spacing: 0;
      margin-bottom: 14px;
    }

    .eyebrow span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--amber);
      box-shadow: 0 0 24px rgba(243,182,82,.7);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(42px, 7vw, 88px);
      line-height: .98;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 740px;
      margin: 20px 0 0;
      color: #dbe2dd;
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.7;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 28px;
    }

    .primary, .icon-btn.active, .tab.active {
      background: var(--teal);
      color: #07100f;
      border-color: transparent;
      font-weight: 800;
    }

    .primary, .ghost {
      min-height: 44px;
      padding: 0 18px;
      border-radius: var(--radius);
    }

    .metrics {
      width: min(1180px, calc(100% - 32px));
      margin: -28px auto 0;
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric {
      min-height: 92px;
      border: 1px solid var(--line);
      background: rgba(21,26,33,.94);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .metric strong {
      display: block;
      font-size: 28px;
      line-height: 1;
      color: var(--amber);
    }

    .metric span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.35;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 28px auto 60px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 4;
      display: grid;
      grid-template-columns: 1fr 220px auto;
      gap: 10px;
      padding: 12px 0;
      background: rgba(14,17,22,.92);
      backdrop-filter: blur(14px);
    }

    .search, select {
      min-height: 44px;
      width: 100%;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 14px;
    }

    .view-toggle {
      display: grid;
      grid-template-columns: repeat(2, 44px);
      gap: 8px;
    }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      font-size: 18px;
    }

    .tabs {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 4px 0 16px;
      scrollbar-width: thin;
    }

    .tab {
      white-space: nowrap;
      border-radius: 999px;
      padding: 9px 14px;
      color: var(--muted);
    }

    .content {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
      align-items: start;
    }

    .models.grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .models.list {
      display: grid;
      gap: 8px;
    }

    .card {
      min-height: 184px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
    }

    .list .card {
      min-height: 0;
      display: grid;
      grid-template-columns: 64px 1fr auto;
      align-items: center;
    }

    .card:hover {
      transform: translateY(-2px);
      border-color: rgba(57,211,199,.46);
      background: var(--panel-2);
    }

    .num {
      width: 54px;
      height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #07100f;
      background: var(--amber);
      font-weight: 900;
    }

    .model-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .en {
      color: var(--teal);
      font-weight: 800;
      line-height: 1.35;
    }

    .ability {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.45;
    }

    .wisdom-summary {
      margin-top: 8px;
      color: var(--amber);
      font-weight: 800;
    }

    .wisdom-list {
      display: grid;
      gap: 10px;
      margin-top: 18px;
      max-height: min(62vh, 680px);
      overflow: auto;
      padding-right: 4px;
    }

    .wisdom-item {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: rgba(255,255,255,.04);
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .wisdom-index {
      width: 44px;
      height: 32px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      color: #07100f;
      background: var(--green);
      font-weight: 900;
    }

    .wisdom-item h3 {
      margin: 0 0 6px;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .wisdom-item p {
      margin: 5px 0;
      color: var(--muted);
      line-height: 1.62;
    }

    .wisdom-item b {
      color: var(--text);
    }

    .card-actions {
      margin-top: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mini {
      width: 38px;
      height: 38px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
    }

    .open {
      min-height: 38px;
      padding: 0 12px;
      border-radius: var(--radius);
    }

    .coach {
      position: sticky;
      top: 80px;
      border-left: 3px solid var(--teal);
      background: #121820;
      padding: 18px;
    }

    .coach h2 {
      margin: 0 0 10px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .coach p {
      color: var(--muted);
      line-height: 1.7;
      margin: 0 0 14px;
    }

    .node-list {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .node {
      border: 1px solid var(--line);
      background: rgba(255,255,255,.04);
      border-radius: var(--radius);
      padding: 12px;
    }

    .node b {
      display: block;
      color: var(--text);
      margin-bottom: 4px;
    }

    .node small {
      color: var(--muted);
      line-height: 1.4;
    }

    dialog {
      width: min(880px, calc(100% - 28px));
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0;
      box-shadow: var(--shadow);
    }

    dialog::backdrop {
      background: rgba(0,0,0,.72);
      backdrop-filter: blur(8px);
    }

    .modal-head {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      border-bottom: 1px solid var(--line);
    }

    .modal-head h2 {
      margin: 0;
      font-size: clamp(24px, 4vw, 36px);
      letter-spacing: 0;
    }

    .close {
      width: 42px;
      height: 42px;
      border-radius: var(--radius);
      font-size: 22px;
    }

    .modal-body {
      padding: 20px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .detail-node {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: rgba(255,255,255,.04);
      min-height: 128px;
    }

    .detail-node strong {
      display: block;
      color: var(--amber);
      margin-bottom: 6px;
    }

    .detail-node p {
      color: var(--muted);
      margin: 0;
      line-height: 1.65;
    }

    .empty {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px;
      color: var(--muted);
      background: var(--panel);
    }

    @media (max-width: 980px) {
      .metrics, .content, .toolbar {
        grid-template-columns: 1fr;
      }

      .metrics {
        margin-top: 12px;
      }

      .models.grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .coach {
        position: static;
      }

      .view-toggle {
        grid-template-columns: repeat(2, 44px);
        justify-content: start;
      }
    }

    @media (max-width: 640px) {
      .hero {
        min-height: 620px;
      }

      .hero-inner {
        padding-top: 56px;
      }

      .metrics, .models.grid, .detail-grid, .list .card {
        grid-template-columns: 1fr;
      }

      .list .card {
        align-items: start;
      }

      .model-title {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="hero">
      <div class="hero-inner">
        <div class="eyebrow"><span></span>Life OS 001</div>
        <h1>預測模型100<br><span style="font-size:.48em; line-height:1.15; display:block; margin-top:10px; color:#dbe2dd;">大腦的100種想法地圖</span></h1>
        <p class="subtitle">「預測模型」就是：大腦會一直猜接下來會發生什麼。這個 APP 把 100 種常見想法，變成聽得懂、做得到、今天就能練的小行動。</p>
        <div class="hero-actions">
          <button class="primary" id="startBtn">開始探索</button>
          <button class="ghost" id="randomBtn">隨機抽一個模型</button>
        </div>
      </div>
    </header>

    <section class="metrics" aria-label="Life OS stats">
      <div class="metric"><strong>100</strong><span>100 種想法地圖</span></div>
      <div class="metric"><strong>10</strong><span>看懂大腦怎麼猜</span></div>
      <div class="metric"><strong>5,000</strong><span>可以照做的小行動</span></div>
      <div class="metric"><strong>50</strong><span>每張地圖 50 個練習</span></div>
    </section>

    <main id="app">
      <section class="toolbar" aria-label="Controls">
        <input class="search" id="search" type="search" placeholder="搜尋你現在遇到的事，例如：焦慮 / 拖延 / 信任 / 033">
        <select id="domain" aria-label="Domain filter"></select>
        <div class="view-toggle" aria-label="View mode">
          <button class="icon-btn active" id="gridBtn" title="卡片檢視" aria-label="卡片檢視">▦</button>
          <button class="icon-btn" id="listBtn" title="清單檢視" aria-label="清單檢視">☰</button>
        </div>
      </section>

      <nav class="tabs" id="tabs" aria-label="Model domains"></nav>

      <section class="content">
        <div>
          <div class="models grid" id="models"></div>
          <div class="empty" id="empty" hidden>找不到符合條件的模型。換一個關鍵字，或回到「全部」。</div>
        </div>

        <aside class="coach">
          <h2>50 個真的做得到的小行動</h2>
          <p>每張「想法地圖」都有 50 個生活練習：遇到焦慮、拖延、生氣、沒動力時，可以直接挑一個來做。</p>
          <button class="primary" id="speakNodes">播放英文</button>
          <div class="node-list" id="nodes"></div>
        </aside>
      </section>
    </main>
  </div>

  <dialog id="detail">
    <div class="modal-head">
      <div>
        <div class="eyebrow"><span></span><span id="detailNum"></span></div>
        <h2 id="detailTitle"></h2>
        <div class="en" id="detailEn"></div>
        <div class="ability" id="detailAbility"></div>
      </div>
      <button class="close" id="closeDetail" aria-label="關閉">×</button>
    </div>
    <div class="modal-body">
      <div class="card-actions">
        <button class="primary" id="detailSpeak">播放英文</button>
        <button class="ghost" id="copyPrompt">複製 AI 訓練提示</button>
      </div>
      <div class="detail-grid" id="detailNodes"></div>
    </div>
  </dialog>

  <script>
    const domains = [
      { key: "core", label: "核心腦科學", range: [1, 18] },
      { key: "growth", label: "學習與決策", range: [19, 32] },
      { key: "emotion", label: "情緒與身體", range: [33, 46] },
      { key: "relation", label: "關係與教育", range: [47, 57] },
      { key: "business", label: "商業與財富", range: [58, 70] },
      { key: "leadership", label: "溝通與創造", range: [71, 86] },
      { key: "lifeos", label: "Life OS 整合", range: [87, 100] }
    ];

    const nodes = [
      ["本質", "What", "看見這個模型真正處理的是什麼，先抓核心，不急著處理表面問題。"],
      ["為什麼存在", "Why", "理解它保護、節能、學習或創造了什麼，才知道如何更新。"],
      ["結構", "Structure", "拆成輸入、內在模型、預測、行動與回饋五個部分。"],
      ["運作機制", "Mechanism", "看它如何從過去經驗推估現在，並預先安排下一步行動。"],
      ["錯誤模型", "Wrong Model", "找出過時、過度防衛、過度簡化或與現實不符的預測。"],
      ["更新模型", "Updated Model", "用新證據、新行動和新回饋重寫內在假設。"],
      ["反思問題", "Reflection Questions", "用好問題讓大腦看見原本自動運作的預測。"],
      ["每日練習", "Daily Practice", "設計一個今天就能完成的小行動，讓模型有新資料可學。"],
      ["生活案例", "Real-life Example", "把抽象模型落到人際、健康、工作或學習情境中。"],
      ["AI APP 訓練", "Interactive Module", "轉成可對話、可測驗、可追蹤的互動任務。"]
    ];

    const highImpactBehaviors = [
      ["先停三秒", "Pause for three seconds", "很多錯誤不是因為你不懂，而是你太快反應。先停一下，模型才有機會更新。", "Many mistakes happen not because you do not know, but because you react too fast. Pause first so the model can update.", "在回訊息、開口、下決定前，先停三秒再動。", "Before replying, speaking, or deciding, pause for three seconds."],
      ["把感覺翻成一句話", "Turn the feeling into one sentence", "模糊的感覺會放大壓力；說成一句話，它就開始變小。", "A vague feeling grows stress. Put it into one sentence, and it starts to shrink.", "寫下：我現在其實是在擔心什麼？", "Write: what am I actually worried about right now?"],
      ["只抓下一步", "Find only the next step", "人生卡住時，不需要整張地圖，先找到下一步就會恢復力量。", "When life feels stuck, you do not need the whole map. One next step restores power.", "把今天的任務縮小成一個 5 分鐘動作。", "Shrink today's task into one five-minute action."],
      ["先照顧身體電量", "Take care of body battery first", "很多人生問題，其實是身體電量太低時做出的悲觀預測。", "Many life problems are pessimistic predictions made by a low-battery body.", "先喝水、伸展、走 3 分鐘，再重新判斷。", "Drink water, stretch, walk for three minutes, then judge again."],
      ["問證據在哪裡", "Ask where the evidence is", "大腦很會把感覺當事實；證據問題能把你拉回現實。", "The brain loves treating feelings as facts. Evidence questions bring you back to reality.", "問自己：我有證據，還是只有想像？", "Ask: do I have evidence, or only imagination?"],
      ["把問題說小一點", "Make the problem smaller", "問題太大，大腦會逃跑；問題變小，行動就會回來。", "If the problem is too big, the brain escapes. Make it smaller, and action returns.", "把一個大問題改寫成一個今天能處理的小問題。", "Rewrite one big problem into a small problem you can handle today."],
      ["先做粗糙版", "Make a rough version first", "完美主義常常是假裝認真的拖延。粗糙版會打開回饋。", "Perfectionism is often procrastination pretending to be serious. A rough version opens feedback.", "用 10 分鐘做一個醜但可看的版本。", "Spend ten minutes making an ugly but usable version."],
      ["把自己當朋友講話", "Talk to yourself like a friend", "你對自己太兇時，智慧會關機；友善不是軟弱，是讓系統能學習。", "When you are too harsh with yourself, wisdom shuts down. Kindness is not weakness; it lets the system learn.", "把內心批評改成一句朋友會說的話。", "Turn one inner criticism into something a friend would say."],
      ["少一點解釋，多一點觀察", "Explain less, observe more", "太快解釋會讓舊模型更牢；先觀察，新的可能性才進得來。", "Explaining too fast strengthens the old model. Observe first so new possibilities can enter.", "今天遇到卡住時，只記錄三個事實，不急著下結論。", "When stuck today, record three facts before concluding."],
      ["找最小可改變處", "Find the smallest changeable point", "你不需要改變整個人生，只要找到一個槓桿點。", "You do not need to change your whole life. Find one leverage point.", "問：這件事裡，我現在真的能改哪一小塊？", "Ask: what small part of this can I actually change now?"],
      ["先降低摩擦", "Lower the friction first", "不是你沒意志力，是入口太難。好的系統會讓好行為變容易。", "It may not be lack of willpower. The entry is too hard. A good system makes good behavior easy.", "把明天要做的第一步先擺到眼前。", "Put tomorrow's first step in front of you today."],
      ["用環境幫你", "Let the environment help you", "靠意志力太累，靠環境比較聰明。", "Relying on willpower is exhausting. Relying on environment is smarter.", "移走一個誘惑，放近一個好選擇。", "Remove one temptation and move one good option closer."],
      ["先問代價", "Ask the cost first", "每個舊習慣都有隱形帳單；看見代價，才有動力更新。", "Every old habit has a hidden bill. Seeing the cost creates motivation to update.", "寫下：如果我繼續這樣三個月，代價是什麼？", "Write: if I continue this for three months, what will it cost?"],
      ["把焦點放回輸入", "Return focus to the input", "你控制不了結果，但你可以提高輸入品質。", "You cannot control every result, but you can improve the quality of your input.", "今天只追蹤一個可控制輸入，不追蹤結果。", "Track one controllable input today, not the result."],

      window.speechSynthesis.cancel();

      return `請用「${model.zh}｜${model.en}」為主題，生成 50 個不同、最啟發、生活化口語化、能帶來大效果的行為。每一項都要包含：智慧 Wisdom、行為 Behavior、今日行動 Today's Action。請雙語呈現，並讓每一項都能在 5-10 分鐘內開始。`;

      return highImpactBehaviors.map(([titleZh, titleEn, wisdomZh, wisdomEn, actionZh, actionEn], index) => {

          titleZh,
          titleEn,
          wisdomZh: `${base}智慧：${wisdomZh}`,

      els.detailNodes.innerHTML = wisdomActions.map(item => `
        <section class="wisdom-item">
          <div class="wisdom-index">${String(item.index).padStart(2, "0")}</div>
          <div>
            <h3>${item.titleZh}｜${item.titleEn}</h3>
            <p><b>智慧 Wisdom</b><br>${item.wisdomZh}<br>${item.wisdomEn}</p>
            <p><b>行為 Behavior</b><br>${item.abilityZh}<br>${item.abilityEn}</p>
            <p><b>今日行動 Today's Action</b><br>${item.actionZh}<br>${item.actionEn}</p>
          </div>
          <button class="mini" title="播放英文" aria-label="播放英文" data-speak-wisdom="${item.index - 1}">▶</button>
        </section>
      `).join("");
      els.detail.showModal();
    }

    function initEvents() {
      els.search.addEventListener("input", renderModels);
      els.domain.addEventListener("change", event => setDomain(event.target.value));

      els.tabs.addEventListener("click", event => {
        const tab = event.target.closest(".tab");
        if (tab) setDomain(tab.dataset.domain);
      });

      els.models.addEventListener("click", event => {
        const speakBtn = event.target.closest("[data-speak]");
        const openBtn = event.target.closest("[data-open]");
        if (speakBtn) {
          const model = models.find(item => item.id === speakBtn.dataset.speak);
          speak(model.en);
        }
        if (openBtn) {
          const model = models.find(item => item.id === openBtn.dataset.open);
          openDetail(model);
        }
      });

      document.querySelector("#gridBtn").addEventListener("click", event => {
        viewMode = "grid";
        document.querySelector("#gridBtn").classList.add("active");
        document.querySelector("#listBtn").classList.remove("active");
        renderModels();
      });

      document.querySelector("#listBtn").addEventListener("click", event => {
        viewMode = "list";
        document.querySelector("#listBtn").classList.add("active");
        document.querySelector("#gridBtn").classList.remove("active");
        renderModels();
      });

      document.querySelector("#startBtn").addEventListener("click", () => {
        document.querySelector("#app").scrollIntoView({ behavior: "smooth" });
        els.search.focus({ preventScroll: true });
      });

      document.querySelector("#randomBtn").addEventListener("click", () => {
        const model = models[Math.floor(Math.random() * models.length)];
        openDetail(model);
      });

      document.querySelector("#speakNodes").addEventListener("click", () => {
        speak(nodes.map(node => node[1]).join(". "));
      });

      els.detailNodes.addEventListener("click", event => {
        const btn = event.target.closest("[data-speak-wisdom]");
        if (!btn) return;
        const item = makeWisdomActions(currentModel)[Number(btn.dataset.speakWisdom)];
        speak(`${item.wisdomEn} ${item.abilityEn} ${item.actionEn}`);
      });

      document.querySelector("#detailSpeak").addEventListener("click", () => speak(currentModel.en));
      document.querySelector("#closeDetail").addEventListener("click", () => els.detail.close());
      els.detail.addEventListener("click", event => {
        const rect = els.detail.getBoundingClientRect();
        const outside = event.clientX < rect.left || event.clientX > rect.right || event.clientY < rect.top || event.clientY > rect.bottom;
        if (outside) els.detail.close();
      });

      document.querySelector("#copyPrompt").addEventListener("click", async event => {
        const prompt = getDailyPrompt(currentModel);
        try {
          await navigator.clipboard.writeText(prompt);
          event.target.textContent = "已複製";
          setTimeout(() => event.target.textContent = "複製 AI 訓練提示", 1200);
        } catch {
          alert(prompt);
        }
      });
    }

    renderFilters();
    renderNodes();
    renderModels();
    initEvents();
  </script>
</body>
</html>
